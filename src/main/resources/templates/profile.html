<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
    <head th:replace="fragments/head :: head('Профиль пользователя')"></head>
    <body>
        <header th:insert="~{fragments/header::header}"></header>
        <main>
            <ul th:if="${user != null}">
                <li>Имя: <span th:text="${user.name}"></span></li>
                <li>Фамилия: <span th:text="${user.surname}"></span></li>
                <li>Почтовый ящик: <span th:text="${user.email}"></span></li>
                <li>Роль: <span th:text="${user.getRoles()}"></span></li>
            </ul>
            <div th:unless="${user != null}">
                <p th:text="message"></p>
            </div>
        </main>
        <footer>
        </footer>
    </body>
</html>
