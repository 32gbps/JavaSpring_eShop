<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="fragments/head :: head('Профиль пользователя')"></head>
<body>
<header th:insert="~{fragments/header::header}"></header>
<main>
    <ul th:if="${user != null}">
        <li>Логин: <span th:text="${user.getUsername()}"></span></li>
        <li>Почтовый ящик: <span th:text="${user.getEmail()}"></span></li>
        <li>Роль: <span th:text="${user.getRole().name}"></span></li>
    </ul>
    <div th:unless="${user != null}">
        <p th:text="message"></p>
    </div>
    <!-- Messages -->
    <div class="messageOut">
        <span id="messageOut-span"></span>
    </div>
    <div th:if="${isAddProductFormActive != null && isAddProductFormActive == true}">
        <div th:replace="fragments/addProductForm"></div>
    </div>
</main>
<footer>
</footer>
</body>
</html>
