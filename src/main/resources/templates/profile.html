<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head::head(${pageTitle})}"></head>
<body th:onload="|initPage(${initMethod})|">
<header th:insert="~{fragments/header::header}"></header>
<div id="div-infoBlock" th:insert="~{fragments/infoBlock::infoBlock(${message})}"></div>
<main>
    <div id="side-container" class="side-container">
        <div id="profile-action-menu">
            <div th:if="${buttonSet == 'ADMIN' || buttonSet == 'MODERATOR'}">
                <button>
                    <a id="a-h2-console" th:href="@{/h2-console}">H2 консоль</a>
                </button>
                <button>
                    <a id="a-actuator" th:href="@{/actuator}">Метрики</a>
                </button>
            </div>
            <div th:if="${buttonSet == 'VENDOR'}">
                <button id="btn-show-productConstructor" onclick="showProductConstructor()">Добавить товар</button>
            </div>
            <div th:if="${buttonSet == 'CUSTOMER'}">
                <button id="btn-show-orders" onclick="showOrders()">Заказы</button>
                <button id="btn-show-profileInfo" onclick="showAccountInfo()">Данные профиля</button>
            </div>
        </div>
    </div>
    <div id="main-container" class="main-container">
        <div class="insertedFragment" th:if="${insertFragment != null && insertFragment == 'reviewForm'}">
            <div th:insert="~{fragments/reviewForm::reviewForm(${product})}"></div>
        </div>
        <div class="insertedFragment" th:if="${insertFragment != null && insertFragment == 'addProductForm'}">
            <div th:insert="~{fragments/addProductForm}"></div>
        </div>
    </div>
</main>
<footer th:insert="~{fragments/footer::footer}"></footer>
</body>
</html>
