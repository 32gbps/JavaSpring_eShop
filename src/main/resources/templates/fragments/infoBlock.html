<!--info block-->
<div th:fragment="infoBlock(textMessage)">


    <!-- Messages -->
    <div th:if="${textMessage != null}">
        <span th:text="${textMessage}"></span>
    </div>
    <div class="messageOut">
        <span id="messageOut-span"></span>
    </div>
    <h2 th:text="${welcomeMsg}">Welcome</h2>
    <p th:text="${greeting}">Hello</p>
</div>
