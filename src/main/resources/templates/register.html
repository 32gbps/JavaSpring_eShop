<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Регистрация')"></head>
<body>
<!-- Сообщения об ошибках/успехе -->
<div th:if="${error}" style="color: red;">
    [[${error}]]
</div>
<div th:if="${success}" style="color: green;">
    [[${success}]]
</div>

<div class="registerForm-div">
    <h2>Регистрация</h2>
    <form class="registerForm" th:action="@{/register}" method="post">
        <div class="input-container">
            <label>Имя:</label>
            <input type="text" name="name">
        </div>
        <div class="input-container">
            <label>Фамилия:</label>
            <input type="text" name="surname">
        </div>
        <div class="input-container">
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>
        <div class="input-container">
            <label>Логин:</label>
            <input type="text" name="username" required>
        </div>
        <div class="input-container">
            <label>Пароль:</label>
            <input type="password" name="password" required>
        </div>
        <div class="input-container">
            <button type="submit">Зарегистрироваться</button>
        </div>
        <div class="input-container">
            <span> Уже есть аккаунт? <a th:href="@{/login}">Войти</a></span>
        </div>
    </form>
</div>
</body>
</html>
