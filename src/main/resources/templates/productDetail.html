<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="fragments/head :: head(${productData.name})"></head>
<body  th:onload="|initProductDetail(${productData.getId()})|">
<header th:insert="~{fragments/header::header}"></header>
<div id="div-infoBlock" th:insert="~{fragments/infoBlock::infoBlock(${message})}"></div>
<main>
    <div class="side-container">
    </div>
    <div class="main-container">
        <h2 th:text="${productData.name}"></h2>
        <!--Краткое инфо о товаре-->
        <div id="Product-ShortInfo-container">
            <!-- Фото товара -->
            <div id="Product-Photo-container">
                <img th:src="@{/PhotoIconTemplate.png}" alt="PhotoTemplate">
            </div>
            <!--Характеристики-->
            <div id="Product-ShortParameters-container">
                <h3>О товаре</h3>
                <div class="Product-About-ShortInfo-List">
                </div>
                <div class="actionBar product-buy-action">
                    <div class="flex-container">
                        <label class="p3" for="Product-Price">Цена</label>
                        <span class="p3" id="Product-Price" th:text="${productData.price}"> ₽</span>
                    </div>
                    <div class="flex-container">
                        <div class="flex-container">
                            <button class="toggleWishlist-btn" data-widget-element="button-wishlist" th:onclick="|toggleWishlistProduct(${productData.id})|">
                                <svg class="wishlist_icon"
                                     xmlns="http://www.w3.org/2000/svg"
                                     viewBox="0 0 176 157"
                                     width="40"
                                     height="40">
                                    <path d="M148.136,84.904 L94.518,138.471 C92.748,140.239 90.562,141.338 88.275,141.771 C84.480,142.518 80.394,141.425 77.453,138.487 L23.835,84.920 C6.685,67.786 6.685,40.006 23.835,22.872 C40.986,5.738 68.792,5.738 85.942,22.872 L85.977,22.907 L86.029,22.855 C103.179,5.721 130.985,5.721 148.136,22.855 C165.286,39.989 165.286,67.769 148.136,84.904 Z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="flex-container">
                            <button id="btn-buyProduct" th:onclick="|toggleProduct(${productData.id})|">Купить</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!--Полная информация о товаре-->
        <div id="Product-FullInfo-container">
            <h2>Описание</h2>
            <div id="Product-Description-container">
                <span th:text="${productData.description}">
                    *Description*
                </span>
            </div>
            <h3>Характеристики</h3>
            <div id="Product-FullParameters-container">
                <div class="Product-About-FullInfo-List">
                    <div class="Product-About-FullInfo-block" th:if="${productData.attributes != null}">
                        <div data-pdi="attribute" class="Product-Attribute-Container p6" th:each="attribute : ${productData.attributes}">
                            <span data-pdi-attribute="key" class="Product-About-FullInfo-Key" th:text="${attribute.getKey()}">Key:</span>
                            <span data-pdi-attribute="value" class="Product-About-FullInfo-Value" th:text="${attribute.getValue()}">value</span>
                        </div>
                        <hr>
                    </div>
                </div>
            </div>
        </div>
        <!--Отзывы-->
        <h2>Отзывы</h2>
        <div id="Product-Reviews-container">
        </div>
    </div>
</main>
<footer>
</footer>
</body>
</html>
