<main>
    <!--Краткое инфо о товаре-->
    <div id="Product-ShortInfo-container">
        <!-- Фото товара -->
        <div id="Product-Photo-container">
            <img src="PhotoIconTemplate.png" alt="PhotoTemplate">
        </div>
        <!--Характеристики-->
        <div id="Product-ShortParameters-container">
            <h3>О товаре</h3>
            <div class="Product-About-ShortInfo-List">
                <div class="Product-About-ShortInfo-block">
                    <div class="Product-About-ShortInfo-KeyValuePair">
                        <span class="Product-About-ShortInfo-Key">Key:</span>
                        <span class="Product-About-ShortInfo-Value">value</span>
                    </div>
                    <hr>
                </div>
            </div>
            <div>
                <label for="Product-Price">Цена</label>
                <span id="Product-Price" th:value="${productData.getPrice()}">12345</span>
                <span id="Product-Price-Valute-Sign">Р</span>
            </div>
            <button>Купить</button> <!-- Добавить обработчик -->
        </div>
    </div>
    <!--Полная информация о товаре-->
    <div id="Product-FullInfo-container">
        <h2>Описание</h2>
        <div id="Product-Description-container">
            <span th:value="${productData.getDescription()}">
                *Description*
            </span>
        </div>
        <h3>Характеристики</h3>
        <div id="Product-FullParameters-container">
            <div class="Product-About-FullInfo-List">
                <div class="Product-About-FullInfo-block" th:if="${productData.getParameters() != null && !productData.getParameters().isEmpty()}">
                    <div class="Product-About-FullInfo-KeyValuePair" th:each="param : ${productData.getParameters()}">
                        <span class="Product-About-FullInfo-Key" th:text="${param.key}">Key:</span>
                        <span class="Product-About-FullInfo-Value" th:text="${param.value}">value</span>
                        <hr>
                    </div>
                </div>
            </div>
        </div>
    </div>
