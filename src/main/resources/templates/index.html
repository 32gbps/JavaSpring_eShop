<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="fragments/head :: head('Главная страница')"></head>
<body class="bg-light">
    <header th:insert="~{fragments/header::header}"></header>
    <main>
        <!-- Messages -->
        <div th:if="${message != null}">
            <span th:text="${message}"></span>
        </div>
        <div class="messageOut">
            <span id="messageOut-span"></span>
        </div>
        <h2 th:text="${welcomeMsg}">Welcome</h2>
        <p th:text="${greeting}">Hello</p>
    </main>
    <footer></footer>
</body>
</html>
